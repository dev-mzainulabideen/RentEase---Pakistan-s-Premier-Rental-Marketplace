<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your password - My Rental Marketplace">
    <title>Forgot Password - My Rental Marketplace</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .forgot-password-page {
            min-height: calc(100vh - 200px);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 50%, #f8f9fa 100%);
            padding: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        .forgot-password-section {
            padding: 3rem 0;
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .forgot-password-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .forgot-password-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(255, 56, 92, 0.08);
            padding: 3.5rem;
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .forgot-password-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .forgot-password-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .forgot-password-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, rgba(255, 56, 92, 0.1) 0%, rgba(255, 107, 157, 0.1) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .forgot-password-icon i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }

        .forgot-password-header h1 {
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .forgot-password-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .reset-success {
            display: none;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.1) 0%, rgba(0, 184, 148, 0.05) 100%);
            border-radius: 16px;
            border: 2px solid var(--success-color);
            margin-bottom: 2rem;
        }

        .reset-success.show {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-success-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            background: var(--success-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-success-icon i {
            font-size: 1.75rem;
            color: #ffffff;
        }

        .back-to-login {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        .back-to-login:hover {
            color: var(--primary-hover);
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .forgot-password-card {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="forgot-password-page">
        <section class="forgot-password-section">
            <div class="forgot-password-container">
                <div class="forgot-password-card">
                    <!-- Success Message -->
                    <div class="reset-success" id="resetSuccess">
                        <div class="reset-success-icon">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>
                        <h3>Email Sent!</h3>
                        <p>We've sent password reset instructions to your email address. Please check your inbox.</p>
                    </div>

                    <!-- Forgot Password Form -->
                    <div id="forgotPasswordForm">
                        <div class="forgot-password-header">
                            <div class="forgot-password-icon">
                                <i class="bi bi-key-fill"></i>
                            </div>
                            <h1>Forgot Password?</h1>
                            <p>Enter your email address and we'll send you instructions to reset your password.</p>
                        </div>

                        <form id="forgotPasswordFormElement" onsubmit="handleForgotPassword(event)">
                            <div class="form-group">
                                <label for="reset-email" class="form-label">
                                    <i class="bi bi-envelope"></i>
                                    <span>Email Address</span>
                                </label>
                                <div class="input-wrapper">
                                    <input 
                                        type="email" 
                                        id="reset-email" 
                                        name="email"
                                        class="form-control" 
                                        placeholder="Enter your email address"
                                        required
                                        autocomplete="email"
                                    >
                                    <span class="input-icon-check"><i class="bi bi-check-circle-fill"></i></span>
                                </div>
                                <div class="form-error" id="email-error"></div>
                            </div>

                            <button type="submit" class="btn-login-submit" id="resetSubmitBtn">
                                <span class="btn-text">Send Reset Link</span>
                                <i class="bi bi-arrow-right btn-icon"></i>
                            </button>
                        </form>

                        <div style="text-align: center;">
                            <a href="login.html" class="back-to-login">
                                <i class="bi bi-arrow-left"></i>
                                <span>Back to Login</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/header.js"></script>
    <script>
        function handleForgotPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('reset-email').value;
            const emailError = document.getElementById('email-error');
            const resetSuccess = document.getElementById('resetSuccess');
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            const submitBtn = document.getElementById('resetSubmitBtn');
            
            // Clear previous errors
            emailError.textContent = '';
            emailError.classList.remove('show');
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailError.textContent = 'Please enter a valid email address';
                emailError.classList.add('show');
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="btn-text">Sending...</span><i class="bi bi-hourglass-split btn-icon"></i>';
            
            // Simulate API call
            setTimeout(() => {
                // In a real application, this would make an API call to your backend
                // For now, we'll simulate success
                
                // Show success message
                resetSuccess.classList.add('show');
                forgotPasswordForm.style.display = 'none';
                
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="btn-text">Send Reset Link</span><i class="bi bi-arrow-right btn-icon"></i>';
                
                // Optional: Redirect to login after 5 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 5000);
            }, 1500);
        }
    </script>
</body>
</html>
