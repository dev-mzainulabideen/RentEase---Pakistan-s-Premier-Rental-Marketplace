<!-- Global Search Bar - Flexible and Context-Aware -->
<!-- Usage: Add class "search-bar-expanded" for landing/search pages, "search-bar-compact" for category pages, "search-bar-inline" for minimal -->
<div class="global-search-bar-wrapper" data-search-variant="expanded">
    <div class="container">
        <div class="global-search-bar" role="search" aria-label="Search for rentals">
            <div class="search-item search-item-location" role="button" tabindex="0" aria-label="Search by location">
                <div class="search-label">Where</div>
                <div class="search-value">Search destinations</div>
            </div>
            <div class="search-divider" aria-hidden="true"></div>
            <div class="search-item search-item-checkin" role="button" tabindex="0" aria-label="Select check-in date">
                <div class="search-label">Check in</div>
                <div class="search-value">Add dates</div>
            </div>
            <div class="search-divider" aria-hidden="true"></div>
            <div class="search-item search-item-checkout" role="button" tabindex="0" aria-label="Select check-out date">
                <div class="search-label">Check out</div>
                <div class="search-value">Add dates</div>
            </div>
            <div class="search-divider" aria-hidden="true"></div>
            <div class="search-item search-item-guests" role="button" tabindex="0" aria-label="Select number of guests">
                <div class="search-label">Guests</div>
                <div class="search-value">Add guests</div>
            </div>
            <button class="search-button" aria-label="Search for rentals" type="button">
                <i class="bi bi-search" aria-hidden="true"></i>
            </button>
        </div>
    </div>
</div>
