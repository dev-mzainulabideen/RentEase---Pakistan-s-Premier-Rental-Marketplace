<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard - My Rental Marketplace">
    <title>Dashboard - My Rental Marketplace</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <style>
        .dashboard-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1.5rem;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.3rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Dashboard Router -->
    <div class="dashboard-loader">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted">Redirecting to your dashboard...</p>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/rbac.js"></script>
    <script src="js/header.js"></script>
    <script>
        // Route to appropriate dashboard based on role
        (function() {
            'use strict';
            
            function routeToDashboard() {
                const user = window.getCurrentUser ? window.getCurrentUser() : null;
                const role = window.getCurrentRole ? window.getCurrentRole() : null;
                
                // Check if user is logged in
                if (!user || !window.isLoggedIn || !window.isLoggedIn()) {
                    sessionStorage.setItem('redirectAfterLogin', 'dashboard.html');
                    window.location.href = 'login.html';
                    return;
                }
                
                // Route based on role
                if (role === 'admin' || (window.hasPermission && window.hasPermission('adminAccess'))) {
                    window.location.href = 'admin/dashboard.html';
                } else if (role === 'owner' || (window.hasPermission && window.hasPermission('createListing'))) {
                    // Owner dashboard - show listings, earnings, bookings as host
                    window.location.href = 'my-listings.html';
                } else if (role === 'renter' || (window.hasPermission && window.hasPermission('viewBookingHistory'))) {
                    // Renter dashboard - show bookings, favorites, search history
                    window.location.href = 'my-bookings.html';
                } else if (role === 'dual_role') {
                    // Dual role: default to renter view, but can switch
                    const activeRole = user.activeRole || 'renter';
                    if (activeRole === 'owner') {
                        window.location.href = 'my-listings.html';
                    } else {
                        window.location.href = 'my-bookings.html';
                    }
                } else {
                    // Default fallback
                    window.location.href = 'profile.html';
                }
            }
            
            // Wait for auth to initialize, then route
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    setTimeout(routeToDashboard, 500);
                });
            } else {
                setTimeout(routeToDashboard, 500);
            }
        })();
    </script>
</body>
</html>
