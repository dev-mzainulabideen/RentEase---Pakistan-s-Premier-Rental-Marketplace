<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentEase - Find & Book Easily</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 30%, #fb7185 60%, #fbbf24 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Main Container */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        
        /* Floating Background Elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(60px);
            animation: float 20s ease-in-out infinite;
        }
        
        .shape-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 350px;
            height: 350px;
            bottom: -80px;
            left: -80px;
            animation-delay: 7s;
        }
        
        .shape-3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            animation-delay: 14s;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            33% { 
                transform: translate(80px, -80px) scale(1.2);
                opacity: 0.5;
            }
            66% { 
                transform: translate(-60px, 60px) scale(0.9);
                opacity: 0.2;
            }
        }
        
        /* Content Card */
        .content-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: clamp(3rem, 6vw, 5rem) clamp(2.5rem, 5vw, 4.5rem);
            box-shadow: 
                0 30px 90px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            max-width: 580px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: cardFadeIn 1s ease-out 0.3s forwards;
        }
        
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* Logo Section */
        .logo-wrapper {
            margin-bottom: clamp(2rem, 4vw, 3rem);
            opacity: 0;
            animation: logoEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
        }
        
        @keyframes logoEntrance {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .logo-link {
            display: inline-block;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .logo-link::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }
        
        .logo-link:hover::before {
            opacity: 1;
        }
        
        .logo-link:hover {
            transform: translateY(-8px) scale(1.05);
        }
        
        .logo-link:active {
            transform: translateY(-4px) scale(1.02);
        }
        
        .logo {
            max-width: clamp(220px, 50vw, 300px);
            width: 100%;
            filter: drop-shadow(0 15px 35px rgba(236, 72, 153, 0.25));
            transition: filter 0.4s ease;
        }
        
        .logo-link:hover .logo {
            filter: drop-shadow(0 20px 50px rgba(236, 72, 153, 0.4));
        }
        
        /* Welcome Text */
        .welcome-section {
            margin-bottom: clamp(2rem, 4vw, 2.5rem);
            opacity: 0;
            animation: textSlideUp 1s ease-out 0.9s forwards;
        }
        
        @keyframes textSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        
        .welcome-subtitle {
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            color: #64748b;
            font-weight: 500;
        }
        
        /* Buttons Section */
        .buttons-wrapper {
            opacity: 0;
            animation: buttonsSlideUp 1s ease-out 1.2s forwards;
        }
        
        @keyframes buttonsSlideUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .btn {
            padding: clamp(1rem, 2.5vw, 1.25rem) clamp(2rem, 4vw, 2.5rem);
            font-size: clamp(0.95rem, 2vw, 1.05rem);
            font-weight: 700;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn i {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }
        
        .btn:hover i {
            transform: translateX(4px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            color: white;
            box-shadow: 0 12px 35px rgba(236, 72, 153, 0.35);
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 50px rgba(236, 72, 153, 0.5);
            color: white;
        }
        
        .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: clamp(1.25rem, 2.5vw, 1.75rem) 0;
            color: #94a3b8;
            font-size: clamp(0.8rem, 1.8vw, 0.9rem);
            font-weight: 600;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, transparent, #e2e8f0 30%, #e2e8f0 70%, transparent);
        }
        
        .divider span {
            padding: 0 1.25rem;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        
        /* Secondary Buttons */
        .secondary-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .btn-secondary {
            background: white;
            color: #ec4899;
            border: 2px solid #ec4899;
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.15);
        }
        
        .btn-secondary:hover {
            background: #ec4899;
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(236, 72, 153, 0.3);
        }
        
        .btn-secondary:active {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(236, 72, 153, 0.25);
        }
        
        /* Features Footer */
        .features {
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            margin-top: clamp(2rem, 4vw, 2.5rem);
            padding-top: clamp(2rem, 4vw, 2.5rem);
            border-top: 2px solid #f1f5f9;
            opacity: 0;
            animation: featuresSlideUp 1s ease-out 1.5s forwards;
        }
        
        @keyframes featuresSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .feature-item {
            text-align: center;
            flex: 1;
            transition: transform 0.3s ease;
        }
        
        .feature-item:hover {
            transform: translateY(-5px);
        }
        
        .feature-icon {
            font-size: clamp(1.75rem, 3vw, 2.2rem);
            color: #ec4899;
            margin-bottom: 0.5rem;
            display: block;
            transition: all 0.3s ease;
        }
        
        .feature-item:hover .feature-icon {
            transform: scale(1.15) rotate(5deg);
        }
        
        .feature-text {
            font-size: clamp(0.8rem, 1.8vw, 0.9rem);
            color: #64748b;
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                padding: 1.5rem;
            }
            
            .content-card {
                padding: 2.5rem 2rem;
            }
            
            .secondary-buttons {
                grid-template-columns: 1fr;
            }
            
            .features {
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .bg-shape {
                width: 200px !important;
                height: 200px !important;
            }
        }
        
        @media (max-width: 480px) {
            .content-card {
                padding: 2rem 1.5rem;
                border-radius: 25px;
            }
            
            .logo {
                max-width: 180px;
            }
            
            .welcome-title {
                font-size: 1.4rem;
            }
            
            .btn {
                padding: 0.9rem 1.75rem;
                font-size: 0.9rem;
            }
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Background Shapes -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
        
        <!-- Content Card -->
        <div class="content-card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <a href="index.html" class="logo-link" aria-label="Go to RentEase Home">
                    <img src="logos/logo.png" alt="RentEase" class="logo">
                </a>
            </div>
            
            <!-- Welcome Text -->
            <div class="welcome-section">
                <h1 class="welcome-title">Welcome to RentEase</h1>
                <p class="welcome-subtitle">Find & Book Easily</p>
            </div>
            
            <!-- Buttons -->
            <div class="buttons-wrapper">
                <div class="buttons">
                    <a href="index.html" class="btn btn-primary">
                        <i class="bi bi-rocket-takeoff-fill"></i>
                        <span>Get Started</span>
                    </a>
                    
                    <div class="divider">
                        <span>or</span>
                    </div>
                    
                    <div class="secondary-buttons">
                        <a href="login.html" class="btn btn-secondary">
                            <i class="bi bi-box-arrow-in-right"></i>
                            <span>Log In</span>
                        </a>
                        <a href="register.html" class="btn btn-secondary">
                            <i class="bi bi-person-plus-fill"></i>
                            <span>Sign Up</span>
                        </a>
                    </div>
                </div>
                
                <!-- Features -->
                <div class="features">
                    <div class="feature-item">
                        <i class="bi bi-shield-check-fill feature-icon"></i>
                        <div class="feature-text">Verified</div>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-lightning-charge-fill feature-icon"></i>
                        <div class="feature-text">Instant</div>
                    </div>
                    <div class="feature-item">
                        <i class="bi bi-headset feature-icon"></i>
                        <div class="feature-text">24/7 Support</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>s
